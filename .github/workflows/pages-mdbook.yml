name: Deploy mdBook to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: "latest"

      - name: Verify i18n sync
        run: scripts/docs/verify_i18n_sync.sh

      - name: Build JA/EN books
        run: scripts/docs/build_books.sh

      - name: Assemble public directory
        run: |
          rm -rf public
          mkdir -p public/ja public/en
          cp -R build/ja/. public/ja/
          cp -R build/en/. public/en/
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=/kasane-docs/en/" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Kasane Developer Docs</title>
            </head>
            <body>
              <p>Redirecting to <a href="/kasane-docs/en/">/kasane-docs/en/</a>...</p>
            </body>
          </html>
          HTML

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
